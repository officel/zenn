---
# Original: https://pre-commit.com/
# Recommended: https://prek.j178.dev/

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/betterleaks/betterleaks
    rev: ac65f4739c352ab23dc2650a65be261016543599  # frozen: v1.5.0
    hooks:
      - id: betterleaks

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      - id: zizmor

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 479ff1e4e2ea17d1bf8ffef84e59a1a6942b55fc  # frozen: v0.2.20
    hooks:
      - id: rumdl
        args: ["--fix"]
      - id: rumdl-fmt

  - repo: https://github.com/owenlamont/ryl-pre-commit
    rev: 052aa238c11fa01a9324706955746b77761e89a3  # frozen: v0.21.0
    hooks:
      - id: ryl
        types_or: [yaml, markdown]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
