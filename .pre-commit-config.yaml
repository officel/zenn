---
# Original: https://pre-commit.com/
# Recommended: https://prek.j178.dev/

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/betterleaks/betterleaks
    rev: ac65f4739c352ab23dc2650a65be261016543599  # frozen: v1.5.0
    hooks:
      - id: betterleaks

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
      - id: zizmor

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 55a16ea4c3faab9ca9d5d82d79a1e9db061420ea  # frozen: v0.2.16
    hooks:
      - id: rumdl
        args: ["--fix"]
      - id: rumdl-fmt

  - repo: https://github.com/owenlamont/ryl-pre-commit
    rev: c4ad375161f4ab823bd05cea6401a30b5e551585  # frozen: v0.17.0
    hooks:
      - id: ryl
        types_or: [yaml, markdown]
        args:
          - -c=.config/.ryl.toml

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
