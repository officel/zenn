ignore = [
    "backup/",
    "node_modules/",
]

[files]
yaml = [
    "*.yaml",
    "*.yml",
    ".yamllint",
]

[rules]
anchors = "enable"
braces = "enable"
brackets = "enable"
colons = "enable"
commas = "enable"
document-end = "disable"
document-start = "disable"
empty-values = "disable"
float-values = "disable"
hyphens = "enable"
indentation = "enable"
key-duplicates = "enable"
key-ordering = "disable"
new-line-at-end-of-file = "enable"
octal-values = "disable"
quoted-strings = "disable"
trailing-spaces = "enable"

[rules.comments]
level = "warning"

[rules.comments-indentation]
level = "warning"

[rules.empty-lines]
level = "warning"

[rules.line-length]
allow-non-breakable-inline-mappings = false
allow-non-breakable-words = true
max = 160

[rules.new-lines]
level = "warning"

[rules.truthy]
allowed-values = [
    "true",
    "false",
]
check-keys = false
level = "warning"
